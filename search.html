<div class="page-hero">
  <p class="page-hero-label">SEARCH</p>
  <h1 class="page-hero-title"><span class="accent">記事</span>を検索</h1>
</div>

<div class="section">
  <div class="search-bar-wrap">
    <input class="search-input" type="text" id="search-input" placeholder="キーワードを入力...">
    <button class="search-btn" id="search-btn">検索 →</button>
  </div>
  <p id="search-status" style="font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;color:var(--muted);margin-bottom:2rem;"></p>
  <div class="articles-grid" id="results-grid"></div>

  <div class="footer-links">
    <a href="about.html">プロフィール</a>

    <a href="contact.html">お問い合わせ</a>
  </div>
</footer>
<script src="shared.js"></script>
<script src="cms.js"></script>
<script>
  const input = document.getElementById('search-input');
  const btn = document.getElementById('search-btn');
  const grid = document.getElementById('results-grid');
  const status = document.getElementById('search-status');

  // URLパラメータから初期クエリ
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) { input.value = q; doSearch(q); }

  btn.addEventListener('click', () => doSearch(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(input.value); });

  async function doSearch(query) {
    if (!query.trim()) return;
    history.replaceState(null, '', `?q=${encodeURIComponent(query)}`);
    showLoading(grid);
    status.textContent = '検索中...';
    const results = await searchArticles(query);
    if (results.length === 0) {
      showEmpty(grid, `「${query}」の検索結果はありませんでした`);
      status.textContent = '0 件';
    } else {
      grid.innerHTML = results.map(a => articleCardHTML(a)).join('');
      status.textContent = `「${query}」の検索結果：${results.length} 件`;
    }
  }
</script>
